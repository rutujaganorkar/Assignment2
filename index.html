<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Practice Grid Layout</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #e8eef3;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }

    .grid-wrapper {
      background: white;
      border: 2px solid #999;
      padding: 28px 36px 36px;
      width: 92%;
      max-width: 980px;
    }

    h2 {
      text-align: center;
      text-decoration: underline;
      font-size: 1.35rem;
      margin-bottom: 18px;
      color: #111;
      font-weight: normal;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: 65px 65px 65px 65px 70px 70px 70px;
      gap: 3px;
      background: #555;
    }

    .cell {
      padding: 5px 8px;
      font-size: 1rem;
      font-weight: 500;
      color: #222;
    }

    .b1 {
      background: #cfe000;
      grid-column: 1 / 5;
      grid-row: 1 / 5;
    }

    .b2 {
      background: #e8920a;
      grid-column: 5 / 9;
      grid-row: 1 / 2;
    }

    .b3 {
      background: #cfe000;
      grid-column: 5 / 9;
      grid-row: 2 / 3;
    }

    .b456-wrapper {
      grid-column: 5 / 9;
      grid-row: 3 / 4;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      padding: 0;
      background: #555;
    }

    .b456-wrapper .cell {
    }
    .b7 {
      background: #e03c2d;
      grid-column: 9 / 13;
      grid-row: 1 / 3;
    }

    .b8 {
      background: #4a7a3d;
      grid-column: 9 / 13;
      grid-row: 3 / 5;
    }

    .b10a {
      background: #cfe000;
      grid-column: 1 / 4;
      grid-row: 5 / 6;
    }

    .b10b {
      background: #e8920a;
      grid-column: 4 / 7;
      grid-row: 5 / 6; 
    }

    .b11 {
      background: #a8d8f0;
      grid-column: 1 / 3;
      grid-row: 6 / 8;
    }

    .b12 {
      background: #a8d8f0;
      grid-column: 3 / 5;
      grid-row: 6 / 8;
    }

    .b13 {
      background: #e8920a;
      grid-column: 5 / 7;
      grid-row: 6 / 8;
    }

    .b14 {
      background: #e03c2d;
      grid-column: 7 / 10;
      grid-row: 5 / 8;
    }

    .b15 {
      background: #e49fc8;
      grid-column: 10 / 13;
      grid-row: 5 / 6;
    }

    .b16 {
      background: #cfe000;
      grid-column: 10 / 13;
      grid-row: 6 / 7;
    }

    .b17 {
      background: #b8b8b8;
      grid-column: 10 / 13;
      grid-row: 7 / 8;
    }
  </style>
</head>
<body>
  <div class="grid-wrapper">
    <h2>Practice Grid Layoud</h2>

    <div class="grid">

      <div class="cell b1">1</div>
      <div class="cell b2">2</div>
      <div class="cell b3">3</div>
      <div class="b456-wrapper">
        <div class="cell" style="background:#4a7a3d;">4</div>
        <div class="cell" style="background:#7b7bd4;">5</div>
        <div class="cell" style="background:#cfe000;">6</div>
      </div>

      <div class="cell b7">7</div>
      <div class="cell b8">8</div>
      <div class="cell b10a">10</div>
      <div class="cell b10b">10</div>
      <div class="cell b11">11</div>
      <div class="cell b12">12</div>
      <div class="cell b13">13</div>

      <div class="cell b14">14</div>
      <div class="cell b15">15</div>
      <div class="cell b16">16</div>
      <div class="cell b17">17</div>

    </div>
  </div>
</body>
</html>
